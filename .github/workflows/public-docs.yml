name: Public Docs Monitor

on:
  schedule:
    - cron: '0 0 * * *' # Tự động quét mỗi ngày
  push:
    paths:
      - 'source.txt'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Knowledge Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install GitIngest
        run: pip install gitingest

      - name: Run Ingest Script
        run: python ingest_public_docs.py

      - name: Push to Knowledge Base
        run: |
          git config --global user.name "AI-Knowledge-Bot"
          git config --global user.email "bot@ai-docs.com"
          git add consolidated-docs/*.md
          git commit -m "Sync public docs: $(date +'%Y-%m-%d')" || echo "No changes"
          git push
